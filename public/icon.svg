<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
    </style>
  </defs>
  <!-- Background: near-black rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0a0e1a"/>
  <!-- Inner border accent -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="none" stroke="#1a6dff" stroke-width="4" opacity="0.3"/>
  <!-- Drop shadow for letters (magenta) -->
  <text x="260" y="228" font-family="'Press Start 2P', monospace" font-size="200" fill="#ff2d9b" text-anchor="middle" dominant-baseline="central">U</text>
  <text x="260" y="388" font-family="'Press Start 2P', monospace" font-size="200" fill="#ff2d9b" text-anchor="middle" dominant-baseline="central">N</text>
  <!-- Main letters (arcade yellow) -->
  <text x="256" y="224" font-family="'Press Start 2P', monospace" font-size="200" fill="#ffd700" text-anchor="middle" dominant-baseline="central">U</text>
  <text x="256" y="384" font-family="'Press Start 2P', monospace" font-size="200" fill="#ffd700" text-anchor="middle" dominant-baseline="central">N</text>
</svg>
